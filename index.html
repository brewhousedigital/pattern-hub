<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/icons/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/stylesheet.css" />

    <!--
      Initial-load skeleton: pure CSS, no JS. Rendered inline (not inside #root)
      so the browser paints it before the app bundle downloads/executes, and
      `src/main.tsx` never sees it (it only checks #root's innerHTML). It's
      hidden automatically the instant React mounts real content into #root,
      via the #root:empty sibling selector below - no cleanup script needed.
    -->
    <style>
      #initial-loader { display: none; }
      #root:empty ~ #initial-loader { display: block; }

      @keyframes il-shimmer {
        0% { background-position: -400px 0; }
        100% { background-position: 400px 0; }
      }

      #initial-loader {
        background-color: #f4f7f5;
        min-height: 100svh;
      }

      #initial-loader .il-shimmer-light {
        background-color: #e2e6e4;
        background-image: linear-gradient(90deg, rgba(255, 255, 255, 0) 25%, rgba(255, 255, 255, 0.8) 37%, rgba(255, 255, 255, 0) 63%);
        background-size: 400px 100%;
        background-repeat: no-repeat;
        animation: il-shimmer 1.4s ease-in-out infinite;
      }

      #initial-loader .il-shimmer-dark {
        background-color: rgba(255, 255, 255, 0.12);
        background-image: linear-gradient(90deg, rgba(255, 255, 255, 0) 25%, rgba(255, 255, 255, 0.22) 37%, rgba(255, 255, 255, 0) 63%);
        background-size: 400px 100%;
        background-repeat: no-repeat;
        animation: il-shimmer 1.4s ease-in-out infinite;
      }

      #initial-loader .il-header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 16px;
        background-color: rgb(244, 247, 245);
      }

      #initial-loader .il-logo {
        width: 140px;
        height: 28px;
        border-radius: 6px;
        flex-shrink: 0;
      }

      #initial-loader .il-nav {
        display: flex;
        gap: 20px;
        flex: 1;
      }

      #initial-loader .il-pill {
        width: 56px;
        height: 16px;
        border-radius: 8px;
      }

      #initial-loader .il-header-icons {
        display: flex;
        gap: 12px;
        flex-shrink: 0;
      }

      #initial-loader .il-circle {
        width: 32px;
        height: 32px;
        border-radius: 50%;
      }

      #initial-loader .il-search {
        height: 48px;
        margin: 16px;
        border-radius: 12px;
      }

      #initial-loader .il-body {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0;
        padding: 0 16px 16px;
      }

      #initial-loader .il-sidebar {
        display: none;
      }

      #initial-loader .il-main {
        background-color: #0b6536;
        border-radius: 24px;
        padding: 24px;
        min-height: calc(100svh - 220px);
      }

      #initial-loader .il-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }

      #initial-loader .il-tile {
        aspect-ratio: 1 / 1;
        border-radius: 16px;
      }

      @media (min-width: 600px) {
        #initial-loader .il-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      @media (min-width: 900px) {
        #initial-loader .il-body {
          grid-template-columns: 260px 1fr;
          gap: 16px;
        }

        #initial-loader .il-sidebar {
          display: flex;
          flex-direction: column;
          gap: 12px;
          padding-top: 4px;
        }

        #initial-loader .il-sidebar .il-block {
          height: 40px;
          border-radius: 8px;
        }

        #initial-loader .il-grid {
          grid-template-columns: repeat(4, 1fr);
        }
      }

      @media (min-width: 1200px) {
        #initial-loader .il-grid {
          grid-template-columns: repeat(5, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="initial-loader" aria-hidden="true">
      <div class="il-header">
        <div class="il-logo il-shimmer-light"></div>
        <div class="il-nav">
          <div class="il-pill il-shimmer-light"></div>
          <div class="il-pill il-shimmer-light"></div>
          <div class="il-pill il-shimmer-light"></div>
          <div class="il-pill il-shimmer-light"></div>
        </div>
        <div class="il-header-icons">
          <div class="il-circle il-shimmer-light"></div>
          <div class="il-circle il-shimmer-light"></div>
        </div>
      </div>

      <div class="il-search il-shimmer-light"></div>

      <div class="il-body">
        <div class="il-sidebar">
          <div class="il-block il-shimmer-light"></div>
          <div class="il-block il-shimmer-light"></div>
          <div class="il-block il-shimmer-light"></div>
          <div class="il-block il-shimmer-light"></div>
        </div>

        <div class="il-main">
          <div class="il-grid">
            <div class="il-tile il-shimmer-dark"></div>
            <div class="il-tile il-shimmer-dark"></div>
            <div class="il-tile il-shimmer-dark"></div>
            <div class="il-tile il-shimmer-dark"></div>
            <div class="il-tile il-shimmer-dark"></div>
            <div class="il-tile il-shimmer-dark"></div>
            <div class="il-tile il-shimmer-dark"></div>
            <div class="il-tile il-shimmer-dark"></div>
            <div class="il-tile il-shimmer-dark"></div>
            <div class="il-tile il-shimmer-dark"></div>
          </div>
        </div>
      </div>
    </div>

    <form name="contact" data-netlify="true" hidden netlify-honeypot="bot-field">
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
