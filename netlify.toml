# TanStack Start SSR - the @netlify/vite-plugin-tanstack-start plugin emits the
# server function and routing config into dist/ during `vite build`.
# Requests not matched by a static asset or an explicit function path
# (e.g. the /api/* functions in netlify/functions) are handled by the SSR function.

# Use for maintenance
#[[redirects]]
#  from = "/*"
#  to = "/maintenance.html"
#  status = 503
#  force = true

[build]
  publish = "dist/client"
  command = "npm run build"

[build.environment]
  # This sets the BUILD-time Node version only. It does NOT reliably control
  # the deployed Functions runtime - Netlify's function execution environment
  # is controlled by AWS_LAMBDA_JS_RUNTIME, which per Netlify's own docs and
  # support team can ONLY be set via the Netlify UI/CLI/API, never from
  # netlify.toml (confirmed by shipping this exact NODE_VERSION setting and
  # still hitting the ERR_REQUIRE_ESM error below on the actual function
  # runtime). Kept here anyway for a consistent build environment, but see
  # USER_SUBMITTED_PATTERNS_SETUP.md for the required dashboard step - set
  # AWS_LAMBDA_JS_RUNTIME = "nodejs22.x" (or nodejs24.x) under Site settings ->
  # Environment variables, then redeploy. Without that UI-side variable, this
  # NODE_VERSION alone does not fix the jsdom/@exodus/bytes crash.
  NODE_VERSION = "22"

[functions]
  # `canvas` ships a native .node binary that esbuild can't bundle into JS -
  # it (and sharp) must stay external and have their files copied verbatim.
  # `pdfjs-dist`'s standard_fonts/cmaps are read from disk at runtime
  # (pdf-to-img resolves paths via require.resolve('pdfjs-dist/package.json')),
  # so those assets need to ship too, not just get bundled as code. `jsdom` is
  # also kept external/its files included so esbuild doesn't touch its
  # dynamically-imported module graph - real Node module resolution at
  # runtime, on the Node 22+ set above, is what actually resolves the
  # ERR_REQUIRE_ESM issue documented above.
  external_node_modules = ["sharp", "canvas", "jsdom"]
  included_files = [
    "node_modules/sharp/**/*",
    "node_modules/canvas/**/*",
    "node_modules/pdfjs-dist/**/*",
    "node_modules/jsdom/**/*",
  ]

[dev]
  command = "npm run dev"
  port = 3000
