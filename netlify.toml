# TanStack Start SSR - the @netlify/vite-plugin-tanstack-start plugin emits the
# server function and routing config into dist/ during `vite build`.
# Requests not matched by a static asset or an explicit function path
# (e.g. the /api/* functions in netlify/functions) are handled by the SSR function.

# Use for maintenance
#[[redirects]]
#  from = "/*"
#  to = "/maintenance.html"
#  status = 503
#  force = true

[build]
  publish = "dist/client"
  command = "npm run build"

[build.environment]
  # This sets the BUILD-time Node version only. It does NOT reliably control
  # the deployed Functions runtime - Netlify's function execution environment
  # is controlled by AWS_LAMBDA_JS_RUNTIME, which per Netlify's own docs and
  # support team can ONLY be set via the Netlify UI/CLI/API, never from
  # netlify.toml (confirmed by shipping this exact NODE_VERSION setting and
  # still hitting the ERR_REQUIRE_ESM error below on the actual function
  # runtime). Kept here anyway for a consistent build environment, but see
  # USER_SUBMITTED_PATTERNS_SETUP.md for the required dashboard step - set
  # AWS_LAMBDA_JS_RUNTIME = "nodejs22.x" (or nodejs24.x) under Site settings ->
  # Environment variables, then redeploy. Without that UI-side variable, this
  # NODE_VERSION alone does not fix the jsdom/@exodus/bytes crash.
  NODE_VERSION = "22"

[functions]
  # `sharp` ships native platform binaries via optionalDependencies that
  # esbuild can't bundle into JS - it must stay external and have its files
  # copied verbatim.
  #
  # PDF rasterization now happens entirely in the browser (see
  # src/functions/utilities/pdf-to-image.ts) - the server only ever receives
  # images and SVGs, so `@napi-rs/canvas`/`pdfjs-dist` are no longer needed
  # here.
  #
  # SVG sanitization uses `linkedom` (not `jsdom`) specifically because
  # jsdom's HTML-browser-emulation dependencies (whatwg-url,
  # html-encoding-sniffer) pull in an ESM-only package that AWS Lambda's
  # managed Node runtimes can't require() synchronously, crashing every SVG
  # submission - see netlify/functions/_lib/svg-server-sanitize.ts and
  # USER_SUBMITTED_PATTERNS_SETUP.md for the full history. linkedom is pure
  # JS with no native bindings and no equivalent dependency landmine, so it
  # needs no special external/included_files treatment here.
  external_node_modules = ["sharp"]
  included_files = [
    "node_modules/sharp/**/*",
  ]

[dev]
  command = "npm run dev"
  port = 3000
