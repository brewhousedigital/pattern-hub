[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Use for maintenance
#[[redirects]]
#  from = "/*"
#  to = "/maintenance.html"
#  status = 503
#  force = true

[build]
  publish = "dist"
  command = "npm run build"

[functions]
  external_node_modules = ["sharp"]
  included_files = ["node_modules/sharp/**/*"]

[dev]
  framework = "vite"

[prerendering]
  enabled = true

# If maintenance mode is not working, comment out this section
[[edge_functions]]
  path = "/*"
  function = "og-meta"

