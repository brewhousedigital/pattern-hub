# TanStack Start SSR - the @netlify/vite-plugin-tanstack-start plugin emits the
# server function and routing config into dist/ during `vite build`.
# Requests not matched by a static asset or an explicit function path
# (e.g. the /api/* functions in netlify/functions) are handled by the SSR function.

# Use for maintenance
#[[redirects]]
#  from = "/*"
#  to = "/maintenance.html"
#  status = 503
#  force = true

[build]
  publish = "dist/client"
  command = "npm run build"

[functions]
  # `canvas` ships a native .node binary that esbuild can't bundle into JS -
  # it (and sharp) must stay external and have their files copied verbatim.
  # `pdfjs-dist`'s standard_fonts/cmaps are read from disk at runtime
  # (pdf-to-img resolves paths via require.resolve('pdfjs-dist/package.json')),
  # so those assets need to ship too, not just get bundled as code.
  external_node_modules = ["sharp", "canvas"]
  included_files = ["node_modules/sharp/**/*", "node_modules/canvas/**/*", "node_modules/pdfjs-dist/**/*"]

[dev]
  command = "npm run dev"
  port = 3000
