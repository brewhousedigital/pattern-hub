<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Under Maintenance - Pattern Archive</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f4f7f5;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: #1a1a1a;
    }

    /* Subtle grid pattern - pure CSS, no images, no JS */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(11,101,54,.07) 39px, rgba(11,101,54,.07) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(11,101,54,.07) 39px, rgba(11,101,54,.07) 40px);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 520px;
      width: 100%;
    }

    .brand {
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #0b6536;
    }

    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 700;
      color: #111;
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }

    .divider {
      width: 44px;
      height: 3px;
      background: #0b6536;
      border-radius: 2px;
      margin: 1.25rem auto 1.5rem;
    }

    .message {
      font-size: 1.0625rem;
      color: #555;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="brand">Pattern Archive</h1>

    <h2>Under Maintenance</h2>

    <div class="divider"></div>

    <p class="message">
      The site is down right now. <br />Check back in a bit.
    </p>
  </div>
</body>
</html>
