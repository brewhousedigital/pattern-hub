<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Under Maintenance - Pattern Archive</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f4f7f5;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: #1a1a1a;
    }

    /* Subtle grid pattern - pure CSS, no images, no JS */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(11,101,54,.07) 39px, rgba(11,101,54,.07) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(11,101,54,.07) 39px, rgba(11,101,54,.07) 40px);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 520px;
      width: 100%;
    }

    .brand {
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #0b6536;
    }

    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 700;
      color: #111;
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }

    .divider {
      width: 44px;
      height: 3px;
      background: #0b6536;
      border-radius: 2px;
      margin: 1.25rem auto 1.5rem;
    }

    .message {
      font-size: 1.0625rem;
      color: #555;
      line-height: 1.7;
    }

    /* Optional "back by" callout - see the commented-out block in the body */
    .eta {
      margin: 1.5rem auto 0;
      padding: 0.75rem 1.25rem;
      display: inline-block;
      background: rgba(11, 101, 54, 0.08);
      border: 1px solid rgba(11, 101, 54, 0.25);
      border-radius: 10px;
      font-size: 0.9375rem;
      color: #0b6536;
      font-weight: 600;
    }

    .links {
      margin-top: 2rem;
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.4rem;
      border-radius: 999px;
      font-size: 0.9375rem;
      font-weight: 600;
      text-decoration: none;
      transition: background-color 0.15s, color 0.15s;
    }

    .links a.discord {
      background: #0b6536;
      color: #f4f7f5;
    }

    .links a.discord:hover {
      background: #094f2a;
    }

    .links a.reddit {
      border: 2px solid #0b6536;
      color: #0b6536;
    }

    .links a.reddit:hover {
      background: rgba(11, 101, 54, 0.08);
    }

    .links-hint {
      margin-top: 0.9rem;
      font-size: 0.8125rem;
      color: #888;
    }
  </style>
</head>
